<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>El microcosmos de nuestro amor ✨</title>

  <style>
    :root{
      --bg0:#070A12;
      --bg1:#0B1230;

      --paper:#F6F2E9;
      --paper2:#FFFDF8;
      --ink:#0B0F1A;

      --radius: 22px;
      --bookW: min(420px, 92vw);
      --bookH: 760px; /* ✅ se setea por JS al máximo */

      --ease: cubic-bezier(.2,.8,.2,1);
      --flipMs: 820ms;

      --accentA: #FF4D6D;
      --accentB: #7C5CFF;
      --accentC: #3CE5D2;

      --spaceSubtitle: 10px;
      --spaceText: 14px;
    }

    /* ✅ Scroll normal del navegador (móvil) */
    body{
      margin:0;
      min-height: 100dvh;
      height: auto;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding: 14px 0 40px;
      color: rgba(255,255,255,.92);
      background:
        radial-gradient(1200px 800px at 10% 10%, rgba(124,92,255,.18), transparent 55%),
        radial-gradient(900px 600px at 90% 15%, rgba(60,229,210,.14), transparent 55%),
        radial-gradient(1000px 700px at 50% 90%, rgba(255,77,109,.16), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
      overflow-y:auto;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    body::before{
      content:"";
      position:fixed; inset:-40px;
      background:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.65), transparent 55%),
        radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,.55), transparent 55%),
        radial-gradient(1px 1px at 25% 75%, rgba(255,255,255,.45), transparent 55%),
        radial-gradient(1px 1px at 55% 45%, rgba(255,255,255,.5), transparent 55%),
        radial-gradient(1.2px 1.2px at 70% 85%, rgba(255,255,255,.35), transparent 55%);
      opacity:.45;
      pointer-events:none;
      transform: translateZ(0);
    }

    .app{
      width: min(980px, 96vw);
      padding: 16px 12px 24px;
    }

    .topbar{
      display:flex;
      gap: 14px;
      align-items:center;
      justify-content:space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap: 12px;
      user-select:none;
      max-width: 520px;
    }
    .logo{
      width: 40px; height: 40px;
      border-radius: 14px;
      background:
        radial-gradient(18px 18px at 30% 30%, rgba(255,255,255,.7), transparent 55%),
        linear-gradient(135deg, rgba(255,77,109,.95), rgba(124,92,255,.95), rgba(60,229,210,.9));
      box-shadow: 0 14px 40px rgba(124,92,255,.25), 0 12px 30px rgba(0,0,0,.25);
      position:relative;
      overflow:hidden;
      flex: 0 0 auto;
    }
    .logo::after{
      content:"";
      position:absolute; inset:-40px;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,.25), transparent);
      transform: rotate(20deg);
      animation: shine 5.8s var(--ease) infinite;
    }
    @keyframes shine{
      0%{ transform: translateX(-40%) rotate(20deg); opacity:.0; }
      18%{ opacity:.55; }
      40%{ transform: translateX(55%) rotate(20deg); opacity:.0; }
      100%{ transform: translateX(55%) rotate(20deg); opacity:0; }
    }

    .brand h1{
      margin:0;
      font-size: 17px;
      letter-spacing:.2px;
      font-weight: 850;
      line-height:1.05;
    }
    .brand p{
      margin:3px 0 0;
      opacity:.78;
      font-size: 12.5px;
      line-height: 1.25;
    }

    .controls{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .pill{
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0,0,0,.22);
      user-select:none;
    }
    .dot{
      width: 7px; height: 7px; border-radius:50%;
      background: rgba(255,255,255,.55);
      box-shadow: 0 0 0 4px rgba(255,255,255,.10);
    }
    .meta{
      font-size: 12.5px;
      opacity: .9;
      white-space:nowrap;
    }

    button{
      appearance:none;
      border:0;
      padding: 10px 14px;
      border-radius: 12px;
      color: rgba(255,255,255,.94);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      cursor:pointer;
      transition: transform 180ms var(--ease), background 180ms var(--ease), border-color 180ms var(--ease);
      box-shadow: 0 10px 25px rgba(0,0,0,.22);
      font-weight: 750;
      letter-spacing:.2px;
    }
    button:hover{ transform: translateY(-1px); background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.22); }
    button:active{ transform: translateY(0); }
    button:disabled{ opacity:.45; cursor:not-allowed; transform:none; }

    .stage{
      position:relative;
      width: 100%;
      display:grid;
      place-items:center;
      padding: 6px 0 0;
    }

    .hint{
      margin-top: 10px;
      font-size: 12px;
      opacity: .75;
      display:flex;
      gap: 8px;
      align-items:center;
      user-select:none;
      justify-content:center;
    }
    .kbd{
      font-size: 11px;
      padding: 4px 7px;
      border-radius: 8px;
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.16);
    }

    /* ✅ Alto fijo para TODAS las páginas (máximo calculado) */
    .scene{
      width: var(--bookW);
      height: var(--bookH);
      border-radius: calc(var(--radius) + 10px);
      background: radial-gradient(900px 500px at 50% 0%, rgba(255,255,255,.10), transparent 70%);
      padding: 10px 0;
      display:grid;
      place-items:center;
      perspective: 1800px;
      transform: translateZ(0);
      touch-action: pan-y; /* swipe vertical = scroll normal */
    }

    .book{
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      filter: drop-shadow(0 28px 80px rgba(0,0,0,.55));
    }

    .book::before{
      content:"";
      position:absolute;
      inset: 0;
      border-radius: var(--radius);
      background:
        linear-gradient(90deg,
          rgba(0,0,0,.35),
          rgba(255,255,255,.06) 10%,
          rgba(255,255,255,.04) 50%,
          rgba(255,255,255,.06) 90%,
          rgba(0,0,0,.32));
      box-shadow: 0 28px 80px rgba(0,0,0,.55);
      transform: translateZ(-6px);
    }

    .edge{
      position:absolute;
      top: 10px;
      right: 10px;
      bottom: 10px;
      width: 14px;
      border-radius: 14px;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,.55) 0px,
          rgba(255,255,255,.55) 2px,
          rgba(240,233,220,.55) 3px,
          rgba(240,233,220,.55) 5px
        );
      opacity:.55;
      transform: translateZ(2px);
      pointer-events:none;
      filter: blur(.15px);
    }

    .sheets{
      position:absolute;
      inset: 0;
      border-radius: var(--radius);
      transform-style: preserve-3d;
    }

    .sheet{
      position:absolute;
      inset: 0;
      transform-style: preserve-3d;
      transform-origin: left center;
      transition: transform var(--flipMs) var(--ease);
      border-radius: var(--radius);
      will-change: transform;
    }

    .face{
      position:absolute;
      inset: 0;
      border-radius: var(--radius);
      overflow:hidden; /* look “libro” */
      backface-visibility: hidden;
      background: linear-gradient(180deg, var(--paper2), var(--paper));
      color: var(--ink);
      box-shadow: 0 18px 44px rgba(0,0,0,.22);
      display:flex;
      flex-direction:column;
    }

    .sheet::after{
      content:"";
      position:absolute;
      top: 0; bottom: 0;
      left: 0;
      width: 28px;
      border-radius: var(--radius);
      background: radial-gradient(24px 80% at 0% 50%, rgba(0,0,0,.38), transparent 70%);
      opacity: 0;
      transform: translateZ(1px);
      transition: opacity var(--flipMs) var(--ease);
      pointer-events:none;
    }
    .sheet.flipping::after{ opacity: 1; }

    .face.back{ transform: rotateY(180deg); }
    .sheet.flipped{ transform: rotateY(-180deg); }

    .pane{
      padding: 18px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      min-height: 100%;
      position:relative;
    }

    /* Imagen fija (no afecta medidas por carga) */
    .hero{
      height: 320px;
      border-radius: 18px;
      overflow:hidden;
      position:relative;
      background: rgba(0,0,0,.06);
      box-shadow: 0 16px 40px rgba(0,0,0,.12);
      flex: 0 0 auto;
    }
    .hero img{
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
      transform: scale(1.02);
      transition: transform 650ms var(--ease);
    }
    .face:hover .hero img{ transform: scale(1.06); }

    .hero::after{
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(180deg, transparent 40%, rgba(0,0,0,.30)),
        radial-gradient(60% 45% at 70% 20%, rgba(255,255,255,.22), transparent 60%);
      pointer-events:none;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing:.35px;
      text-transform: uppercase;
      color: rgba(255,255,255,.94);
      background: linear-gradient(135deg, rgba(99, 3, 126, 0.95), rgba(156, 131, 255, 0.85));
      padding: 9px 11px;
      border-radius: 999px;
      box-shadow: 0 16px 36px rgba(124,92,255,.22);
      width: fit-content;
      position:absolute;
      left: 16px;
      top: 16px;
      z-index: 2;
    }
    .tag .spark{
      width: 9px; height: 9px; border-radius: 50%;
      background: rgba(255,255,255,.85);
      box-shadow: 0 0 0 6px rgba(255,255,255,.14);
    }

    .copy{
      text-align: justify;
      text-justify: inter-word;
      hyphens: auto;
      overflow-wrap: break-word;
    }

    .title{
      margin: 0;
      font-size: 24px;
      line-height: 1.08;
      letter-spacing: .1px;
      font-weight: 900;
      text-align: left;
    }

    .subtitle{
      margin: var(--spaceSubtitle) 0 0;
      font-size: 13.5px;
      opacity: .72;
      line-height: 1.35;
    }
    .text{
      margin: var(--spaceText) 0 0;
      font-size: 15.2px;
      line-height: 1.68;
      color: rgba(10,12,18,.88);
    }

    .footer{
      margin-top:auto;
      display:flex;
      justify-content:flex-end; /* ✅ solo número de página */
      align-items:center;
      padding-top: 6px;
    }
    .pnum{
      font-size: 12px;
      color: rgba(10,12,18,.55);
      font-weight: 850;
      letter-spacing:.2px;
    }

    .cover{
      background:
        radial-gradient(900px 600px at 30% 20%, rgba(124,92,255,.22), transparent 60%),
        radial-gradient(900px 600px at 80% 60%, rgba(60,229,210,.18), transparent 60%),
        linear-gradient(135deg, rgba(255,77,109,.22), rgba(255,255,255,.0) 40%),
        linear-gradient(180deg, #11142B, #090B17);
      color: rgba(255,255,255,.92);
    }
    .cover .text{ color: rgba(255,255,255,.82); }
    .cover .pnum{ color: rgba(255,255,255,.75); }

    @media (prefers-reduced-motion: reduce){
      .sheet{ transition:none; }
      .logo::after{ animation:none; }
      .face:hover .hero img{ transform:none; }
      .sheet::after{ transition:none; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>El microcosmos de nuestro amor ✨</h1>
          <p>Todo por ti princesa amada ✦ desliza o usa ← →</p>
        </div>
      </div>

      <div class="controls">
        <div class="pill" title="Estado del libro">
          <span class="dot" aria-hidden="true"></span>
          <div class="meta" id="statusText">Página 1 / 1</div>
        </div>
        <button id="prevBtn" type="button" aria-label="Página anterior">← Atrás</button>
        <button id="nextBtn" type="button" aria-label="Página siguiente">Siguiente →</button>
      </div>
    </div>

    <div class="stage">
      <div class="scene" id="scene">
        <div class="book" role="application" aria-label="Libro interactivo">
          <div class="edge" aria-hidden="true"></div>
          <div class="sheets" id="sheets"></div>
        </div>
      </div>

      <div class="hint">
        <span class="kbd">←</span><span class="kbd">→</span>
        <span>o swipe para cambiar páginas</span>
      </div>
    </div>
  </div>

  <script>
    const PAGES = [
      {
        kind: "cover",
        tag: "Había una vez...",
        title: "Nuestro microcosmos, en forma de librito ✨",
        subtitle: "Porque el amor que siento por ti no cabe en mí.",
        text: "Me gusta descubrir nuevas maneras de decirte ‘te amo’ sin repetir las mismas palabras. Te amo cada vez que te cuento cuentos, te amo cada vez que nos tomamos de la mano, te amo cada vez que sonríes, te amo ayer, te amo hoy y te amaré mañana simplemente porque amo tu existencia. Y hoy, con todo lo que siento por ti, decidí crear un espacio donde el mundo pueda ver un pedacito de nuestro microcosmos.",
        image: "images/amarte.jpeg"
      },
      { tag: "", title: "", subtitle: "", text: "", image: "" },

      {
        tag: "Gracias bebé",
        title: "Tu existencia es un regalo",
        subtitle: "El amor más bonito que haya existido",
        text: "Tu compañía durante este tiempo ha sido sin duda alguna, una de las experiencias más enriquecedoras de mi vida, porque no solo disfrutamos, también aprendemos y crecemos. Hemos dedicado tiempo a mejorar por nosotros mismos y por nuestro amor. Y hoy amor mío, ese amor quiero tratarlo con delicadeza, protegerlo con mi alma y alimentarlo con nuevas experiencias juntitos. Y sin duda, te agradezco todo lo que haces por mí, por ayudarme en momentos de vulnerabilidad, por tener ganas de disfrutar la vida conmigo y por ser tú misma. Gracias por lo que eres, gracias por ser el amor más bonito que existe.",
        image: "images/juntos.jpeg"
      },
      { tag: "", title: "", subtitle: "", text: "", image: "" },

      {
        tag: "Nuestra primera cita",
        title: "El inicio de nuestro sempiterno",
        subtitle: "Nuestra historia no se lee: se recorre",
        text: "Hace cuatro meses exactamente, un 14 de octubre tuvimos nuestra primera cita, aquella en la que llegaba con nervios y sin imaginar cómo escalaría nuestra historia, una breve cita en una cafetería y luego en un bar de vacas. Fueron nuestras primeras risas juntos, la primera vez que nos sentamos uno al lado del otro y la primera que vez que nos abrazamos, abrazo que se convirtió en un conjunto de muchísimos abrazos, los que guardo con cariño en mis recuerdos. Éramos dos personas compartiendo un instante de nuestras vidas, un instante que poco a poco se transformará en nuestro sempiterno.",
        image: "images/cita.jpeg"
      },
      { tag: "", title: "", subtitle: "", text: "", image: "" },

      {
        tag: "¿Por qué tú?",
        title: "Sé mi mujer, sé mi vida",
        subtitle: "No eres impulso, eres mi elección",
        text: "Me haces sentir en casa, me inspiras, y creo en lo que podemos ser. Te elijo con conciencia, con ganas de cuidarnos y de hacer que esto sea sano porque no solo me gustas, también te admiro, admiro tu inteligencia, tu forma de ver el mundo, tu corazón y tu fuerza. Tienes un brillo único que quiero abrazar toda mi vida, tienes un alma que quiero adornar con mis besos. Y sí… en mi corazón siento que te amo cada día más. Quiero todo contigo amor mío y sé que podemos con todo, porque lo inexistente es lo que no hemos deseado lo suficiente.",
        image: "images/futuro.jpeg"
      },
      { tag: "", title: "", subtitle: "", text: "", image: "" },

      {
        tag: "Por siempre",
        title: "Nuestro amor es fascinante",
        subtitle: "Y te volvería a elegir como mi amada",
        text: "Quiero cuidarte mejor, escucharte de verdad y demostrarte lo importante que eres para mí. Estoy aprendiendo, y voy a tomar cada oportunidad para mejorar y no descansaré hasta ser el hombre de tus sueños y hacer de nuestra relación un espacio seguro. Empecé a volverme loco por ti desde aquella vez que nos dimos un abrazo en el Zacha que fue tan largo como Wonderwall de fondo y me di cuenta del enorme cariño que sentía cuando llevaba tu librito de copiloto para el primer capítulo de Navidad de Marcia chiquita. Desde ese momento te quiero y quiero seguir construyendo mi vida contigo.",
        image: "images/cuidarte.jpeg"
      },
      { tag: "", title: "", subtitle: "", text: "", image: "" },

      {
        tag: "Feliz 14 de Febrero",
        title: "Hoy es el día 146 (par)",
        subtitle: "Y quiero sumar infinitos días a tu lado",
        text: "Te amo con el alma mi vida y quería darte un regalo que pudieses llevar a todos lados, para que puedas recordar el gran amor que te tengo en cualquier momento de tu vida. Espero que este día sea de tu agrado, porque tengo muchas aventuras preparadas para nosotros y me encanta poder planificar nuevas actividades para coleccionar juntitos, porque la vida ilumina más a través de tus ojos. Celebraremos este día, pero me preocuparé de que todos nuestros días sean el día del amor. Buen día amor de mi vida.",
        image: "images/beso2.jpeg"
      },
      { tag: "", title: "", subtitle: "", text: "", image: "" },

      {
        tag: "Explosión de Amor",

        text: "Hoy estamos lejos, una gran distancia nos separa, sin embargo, nuestro amor se siente más fuerte. Cada minuto que pasa hace que te extrañe más y tanto fue nuestra explosión de amor, que rompimos insta con nuestra forma tan pegote y preciosa de ser. Amo sentir que quiero teletransportarme a tu lado y haré todo lo posible por entregarte una vida de ternura y pasión. Una vida en la que nos vayamos a dormir juntos todos los días, una vida en la que le cuentas a todo el mundo lo precioso que es tu anillo de promesa, porque estoy tan enamorado que un noviazgo no es suficiente.",
        image: "images/beso.jpeg"
      },
      { tag: "", title: "", subtitle: "", text: "", image: "" },

      {
        tag: "¿Nuestra foto favorita?",
        title: "Nuestro sempiterno",
        subtitle: "Un amor que no es estático, un amor que tiene vida",
        text: "Cada vez que pienso que ya no es posible vivir una cita más bonita de lo maravilloso que hemos experimentado, llega un nuevo día a tu lado y vuelvo a enamorarme de lo nuestro con una intensidad distinta. Cuando creo que ya tenemos la foto más hermosa, aparecemos otra vez sorprendiéndonos con una nueva que guarda algo aún más nuestro, más vivo, más mágico. Y eso es lo que más me fascina de amarte, que contigo la belleza nunca se acaba, solo se transforma, crece y encuentra nuevas formas de dejarme sin aliento. Siempre hay una ternura nueva (como tus formas de hacerme nanai), un recuerdo nuevo, una versión más preciosa de nuestro sempiterno esperándonos justo después de la anterior.",
        image: "images/sempiterno.jpeg"
      },
      { tag: "", title: "", subtitle: "", text: "", image: "" },

      {
        tag: "Lo que siento por ti",
        title: "Mi lugar seguro",
        subtitle: "Mi amor, mi hogar",
        text: "Eres la persona en quien más confío en todo el mundo, y eso para mí lo significa todo. Me encanta sentir que no solo eres mi novia, sino también mi mejor amiga, con quien puedo compartir cada pensamiento, cada risa y también mis momentos más vulnerables. Siento una conexión tan real que me hace querer seguir construyendo algo cada día más lindo. Tengo muchas ganas de que sigamos creciendo juntos, de acompañarnos en todo, porque no imagino un futuro que no sea contigo a mi lado.",
        image: "images/amor.jpeg"
      },
    ];

    const sheetsEl = document.getElementById("sheets");
    const statusText = document.getElementById("statusText");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const scene = document.getElementById("scene");

    const sheetCount = Math.ceil(PAGES.length / 2);
    let currentSheet = 0;
    let isAnimating = false;

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function hasImage(src) {
      return typeof src === "string" && src.trim().length > 0;
    }

    function makeInner(page, pageNumber) {
      const tag = escapeHtml(page?.tag ?? "");
      const title = escapeHtml(page?.title ?? "");
      const subtitle = escapeHtml(page?.subtitle ?? "");
      const text = escapeHtml(page?.text ?? "");
      const image = page?.image ?? "";
      const tagHtml = tag ? `<div class="tag"><span class="spark"></span>${tag}</div>` : "";

      const heroHtml = hasImage(image)
        ? `
          <div class="hero" aria-hidden="true">
            <img loading="lazy" decoding="async" src="${image}" alt="">
          </div>
        `
        : `
          <div class="hero" aria-hidden="true" style="
            display:grid; place-items:center;
            background:
              radial-gradient(140px 110px at 70% 30%, rgba(124,92,255,.18), transparent 60%),
              radial-gradient(160px 120px at 30% 70%, rgba(255,77,109,.14), transparent 60%),
              linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.02));
          "></div>
        `;

      return `
        <div class="pane">
          <div style="position:relative;">
            ${tagHtml}
            ${heroHtml}
          </div>

          <div class="copy">
            <h2 class="title">${title}</h2>
            <p class="subtitle">${subtitle}</p>
            <p class="text">${text}</p>
          </div>

          <div class="footer">
            <span class="pnum">${pageNumber}</span>
          </div>
        </div>
      `;
    }

    function buildBook() {
      sheetsEl.innerHTML = "";

      for (let i = 0; i < sheetCount; i++) {
        const frontIndex = i * 2;
        const backIndex = frontIndex + 1;

        const front = PAGES[frontIndex] || null;
        const back = PAGES[backIndex] || null;

        const frontNum = frontIndex + 1;
        const backNum = backIndex + 1;

        const sheet = document.createElement("div");
        sheet.className = "sheet";
        sheet.dataset.index = String(i);

        sheet.dataset.zFront = String(sheetCount - i);
        sheet.dataset.zBack  = String(i + 1);
        sheet.style.zIndex = sheet.dataset.zFront;

        const frontEl = document.createElement("div");
        frontEl.className = "face" + (front?.kind === "cover" ? " cover" : "");
        frontEl.innerHTML = makeInner(front, frontNum);

        const backEl = document.createElement("div");
        backEl.className = "face back" + (back?.kind === "cover" ? " cover" : "");
        backEl.innerHTML = makeInner(back, backNum);

        sheet.appendChild(frontEl);
        sheet.appendChild(backEl);
        sheetsEl.appendChild(sheet);
      }
    }

    function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }

    function updateUi() {
      const total = sheetCount;
      const now = clamp(currentSheet + 1, 1, total);
      statusText.textContent = `Página ${now} / ${total}`;
      prevBtn.disabled = currentSheet === 0 || isAnimating;
      nextBtn.disabled = currentSheet >= sheetCount - 1 || isAnimating;
    }

    function sheets(){ return Array.from(document.querySelectorAll(".sheet")); }

    function animateSheet(sheet, toFlipped) {
      if (!sheet) return;

      isAnimating = true;
      prevBtn.disabled = true;
      nextBtn.disabled = true;

      sheet.style.zIndex = "9999";
      sheet.classList.add("flipping");
      void sheet.offsetWidth;

      if (toFlipped) sheet.classList.add("flipped");
      else sheet.classList.remove("flipped");

      let done = false;

      const finish = () => {
        if (done) return;
        done = true;

        sheet.classList.remove("flipping");
        sheet.style.zIndex = toFlipped ? sheet.dataset.zBack : sheet.dataset.zFront;

        isAnimating = false;
        updateUi();
      };

      const onEnd = (e) => {
        if (e && e.propertyName && e.propertyName !== "transform") return;
        sheet.removeEventListener("transitionend", onEnd);
        finish();
      };

      sheet.addEventListener("transitionend", onEnd);

      const ms = parseFloat(getComputedStyle(sheet).transitionDuration) * 1000
               + parseFloat(getComputedStyle(sheet).transitionDelay) * 1000;

      window.setTimeout(() => {
        sheet.removeEventListener("transitionend", onEnd);
        finish();
      }, Math.max(60, Math.round(ms + 120)));
    }

    function goNext() {
      if (isAnimating) return;
      if (currentSheet >= sheetCount - 1) return;

      const all = sheets();
      const s = all[currentSheet];
      if (!s) return;

      animateSheet(s, true);
      currentSheet++;
      updateUi();
    }

    function goPrev() {
      if (isAnimating) return;
      if (currentSheet <= 0) return;

      currentSheet--;
      const all = sheets();
      const s = all[currentSheet];
      if (!s) return;

      animateSheet(s, false);
      updateUi();
    }

    prevBtn.addEventListener("click", goPrev);
    nextBtn.addEventListener("click", goNext);

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") goNext();
      if (e.key === "ArrowLeft") goPrev();
    });

    let startX = 0, startY = 0, down = false;

    scene.addEventListener("pointerdown", (e) => {
      down = true;
      startX = e.clientX;
      startY = e.clientY;
    });

    scene.addEventListener("pointerup", (e) => {
      if (!down) return;
      down = false;

      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

      // vertical swipe => scroll normal
      if (Math.abs(dy) > Math.abs(dx) * 1.2) return;
      if (dx < -35) goNext();
      if (dx > 35) goPrev();
    });

    scene.addEventListener("pointercancel", () => { down = false; });

    (function preload(){
      for (const p of PAGES) {
        if (!p?.image || !hasImage(p.image)) continue;
        const img = new Image();
        img.src = p.image;
      }
    })();

    /* =========================
       ✅ ALTURA FIJA = MAX de todas las páginas
       ========================= */
    const heightCache = new Map();

    function measurePageHeight(pageIndex) {
      if (heightCache.has(pageIndex)) return heightCache.get(pageIndex);

      const page = PAGES[pageIndex] || null;
      const pageNumber = pageIndex + 1;
      const w = scene.getBoundingClientRect().width;

      const wrap = document.createElement("div");
      wrap.style.position = "fixed";
      wrap.style.left = "-10000px";
      wrap.style.top = "0";
      wrap.style.width = `${w}px`;
      wrap.style.visibility = "hidden";
      wrap.style.pointerEvents = "none";

      const face = document.createElement("div");
      face.className = "face" + (page?.kind === "cover" ? " cover" : "");
      face.style.position = "relative";
      face.style.inset = "auto";
      face.style.height = "auto";
      face.style.overflow = "visible";
      face.innerHTML = makeInner(page, pageNumber);

      // Evita que percent/min-height afecte medición en algunos browsers
      const pane = face.querySelector(".pane");
      if (pane) {
        pane.style.minHeight = "auto";
        pane.style.height = "auto";
      }

      wrap.appendChild(face);
      document.body.appendChild(wrap);

      const h = Math.ceil(face.getBoundingClientRect().height);
      document.body.removeChild(wrap);

      const padded = h + 10; // margen anti-mordida
      heightCache.set(pageIndex, padded);
      return padded;
    }

    function fitBookHeightToMaxPage() {
      let maxH = 0;
      for (let i = 0; i < PAGES.length; i++) {
        const h = measurePageHeight(i);
        if (h > maxH) maxH = h;
      }
      const minH = 520;
      const finalH = Math.max(minH, maxH);
      document.documentElement.style.setProperty("--bookH", `${finalH}px`);
    }

    window.addEventListener("resize", () => {
      heightCache.clear();
      fitBookHeightToMaxPage();
      updateUi();
    });

    buildBook();
    fitBookHeightToMaxPage();
    updateUi();
  </script>
</body>
</html>
